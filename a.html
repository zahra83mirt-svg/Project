<html>
<head>
<script>
function q() {
    var x = eval(prompt("enter a number 1"));
    var y = prompt("enter a +, -, *, /");
    var z = eval(prompt("enter a number 2"));
    switch (y) {
        case "+":
            document.write(x + z);
            break;
        case "-":
            document.write(x - z);
            break;
        case "*":
            document.write(x * z);
            break;
        case "/":
            if (z == 0) {
                document.write("taghsim be 0 nemishe");
            } else {
                document.write(x / z);
            }
            break;
        default:
            document.write("na motabar");
            break;
    }
}
</script>
</head>
<body onload="q()">
</body>
</html>
