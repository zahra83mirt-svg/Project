<html>
<head>
<script>
function q() {
    var x = prompt("enter a number 1");
    if (isNaN(x) || x === "") {
        document.write("لطفاً یک عدد معتبر وارد کن!");
        return;
    }
    x = eval(x);
    
    var y = prompt("enter a +, -, *, /");
    
    var z = prompt("enter a number 2");
    if (isNaN(z) || z === "") {
        document.write("لطفاً یک عدد معتبر وارد کن!");
        return;
    }
    z = eval(z);
    
    switch (y) {
        case "+":
            document.write(x + z);
            break;
        case "-":
            document.write(x - z);
            break;
        case "*":
            document.write(x * z);
            break;
        case "/":
            if (z == 0) {
                document.write("taghsim be 0 nemishe");
            } else {
                document.write(x / z);
            }
            break;
        default:
            document.write("na motabar");
            break;
    }
}
</script>
</head>
<body onload="q()">
</body>
</html>
